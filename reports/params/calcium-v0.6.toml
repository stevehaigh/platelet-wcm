# Platelet WCM вЂ” calcium signalling kinetics (v0.5)
#
# Source-of-truth values for the rate constants consumed by
# `reconstruction/platelet/dataclasses/process/calcium_signalling.py`.
#
# This file is the externalised form of the K_* dicts in that module
# (issue #32, Phase 2). It is read at import time by
# `_params_loader.load_calcium_kinetics()`. Editing a value here changes
# the model's behaviour at the next sim вЂ” no Python edit required.
#
# Provenance: each section carries its primary literature citation
# inline. Calibration-coupling chains ("if you change X re-derive Y")
# are documented in `reports/design/calibration-coupling-2026-05-25.qmd`.
#
# Versioning: bump the filename suffix (calcium-v0.6.toml, etc.) when
# changing the schema shape. Value-only updates can stay on the current
# file; pin the value's history in git.

# в”Ђв”Ђ Resting concentrations (calibration targets) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# CA_EX_UM is runtime-overridable from runscripts via
# `cs_mod.CA_EX_UM = X` вЂ” set to 0 for the Dolan Fig. 4 EDTA / no-
# extracellular-CaВІвЃє condition (SOCE current + PM leak both gate on
# CA_EX_UM > 0). IP3_REST_UM is the cytosolic IP3 baseline target
# (Purvis 2008 / Dolan Fig. S2 initial value).
[resting]
ca_ex_uM    = 1200.0   # (ВµM) вЂ” physiological extracellular [CaВІвЃє] in blood plasma (1.2 mM); Dolan 2014 Methods uses this value, matches the standard platelet-experimental protocol (Sage & Rink 1985 et seq.)
ip3_rest_uM = 0.05     # (ВµM) вЂ” cyt IP3 baseline at 50 nM; Purvis 2008 Table 1 / Dolan Fig. S2 initial value


# в”Ђв”Ђ SOCE: Orai single-channel CaВІвЃє conductance в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Effective single-channel Оі for the CRAC/Orai pore. CRAC literature
# Оі ~24 fS (Prakriya & Lewis 2002; Vig 2006), measured at saturating Po
# with patch clamp in HEK cells. Calibrated against the resting balance
# SOCE_rest в‰€ PMCA_steady_rest в‰€ 76 ions/s at the Po(MWC, Sf_rest)
# в‰€ 1.2Г—10вЃ»Ві value produced by the rescaled K_MWC['Ka']. See issue
# #46 for the full single-channel current calibration.
# вљ  CALIBRATION-COUPLED with PMCA basal outflow at rest.
[soce.orai]
gamma_s = 0.3e-15      # A/V вЂ” 0.3 fS effective CaВІвЃє-specific Оі


# в”Ђв”Ђ Plasma-membrane basal CaВІвЃє leak в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Small constant cyt influx that balances PMCA outflow at rest, keeping
# resting CaВІвЃє at ~100 nM. Biologically: unidentified background entry
# (TRPC, NCX reverse, residual constitutive permeability вЂ” Sage & Rink
# 1985вЂ“1990; Brandman et al. 2007 STIM2 review). Calibrated against the
# steady-state PM balance J_SOCE + J_leak = J_PMCA at cyt = 100 nM,
# DTS = 250 ВµM:
#   PMCA quasi-eq outflow в‰€ k_cat В· PMCAВ·Ca_eq в‰€ 5.5 Г— 14 = 77
#   SOCE at full DTS / basal STIM1_dim в‰€ 6
#   в‡’ leak в‰€ 71 ions/s, rounded to 75.
# вљ  CALIBRATION-COUPLED with PMCA basal turnover and CA_EX_UM gating.
[pm.leak]
ions_s = 75.0         # ions/s вЂ” constant cyt influx


# в”Ђв”Ђ IP3R: deYoung-Keizer 1992 / Li-Rinzel 1994 в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Li & Rinzel 1994 reduction of the deYoung-Keizer 1992 8-state IP3R
# model to one slow ODE:
#   mв€ћ(IP3, Ca) = [IP3 / (IP3 + dв‚Ѓ)] Г— [Ca_cyt / (Ca_cyt + dв‚…)]
#   dh/dt       = aв‚‚ Г— [dв‚‚ в€’ (Ca_cyt + dв‚‚) Г— h]
#   Po          = mв€ћвЃґ Г— h
# Parameters from deYoung & Keizer 1992 PNAS 89:9895-9899 Table 1, via
# Li & Rinzel 1994 J Theor Biol 166:461-473.
[ip3r.k_dyk]
d1 = 0.13     # IP3 activation half-saturation   (ВµM)        bв‚Ѓ/aв‚Ѓ = 52/400
d2 = 1.049    # CaВІвЃє inhibition half-saturation  (ВµM)        bв‚„/aв‚„
d5 = 0.08234  # CaВІвЃє activation half-saturation  (ВµM)        bв‚…/aв‚…
a2 = 0.2      # CaВІвЃє inhibition on-rate          (ВµMвЃ»В№В·sвЃ»В№) вЂ” sets П„_h

# в”Ђв”Ђ IP3R channel ensemble вЂ” N + Оі (CALIBRATION-COUPLED, see below) в”Ђв”Ђв”Ђ
# Оі_IP3R is *not* an independently measured single-channel conductance.
# It balances K_SERCA below at the Dolan 2014 platelet resting state
# (cyt = 100 nM, DTS = 250 ВµM). If you change any K_SERCA rate or
# N_IP3R, you MUST re-derive Оі_IP3R from the new SERCA cycle flux.
# See calibration-coupling-2026-05-25.qmd chains 1 + 2.
#
# Derivation (original target Оі = 0.35 pS; the earlier 0.075 pS value reflected
# a re-balance against the corrected IP3R PoвЃґ Г— Nernst flux at V_IM = в€’60 mV):
# SERCA 6-state steady-state flux at the Dolan resting state = 112 570 CaВІвЃє
# ions/s; setting IP3R resting flux equal, Оі = J / (N В· Po В· |driving| В· NA/zF).
#
# Recalibrated 2026-06-16 в†’ 0.135 pS. Moving V_IM to 0 mV (the ER/DTS membrane
# holds в‰€0 mV вЂ” see the [ip3r] potentials header) shrank the resting
# electrochemical driving force (|V_IM в€’ E_Ca| 0.164 в†’ 0.104 V), so the old
# 0.075 pS under-leaked and SERCA over-filled the store (resting DTS drifted to
# ~500 ВµM, cyt to ~6 nM). Оі was re-derived empirically as the value that holds a
# STABLE resting fixed point вЂ” DTS ~255 ВµM, cyt ~96 nM, settled over 400 s вЂ” with
# Dolan 5/5 intact. See dts-depletion-literature-2026-06-14.qmd В§8.
# Biological plausibility: Bezprozvanny 1991 / Mak & Foskett 1997 give effective
# IP3R Оі_Ca at 0.05вЂ“0.5 pS (KвЃє carries most of the unitary current); 0.135 pS is
# in range. The historical 10 pS (Zschauer 1988 via Purvis 2008) was a bilayer
# measurement under symmetric high CaВІвЃє and is not transferable.
[ip3r.channel]
n_total = 1328       # (count) вЂ” Dolan 2014 Table S1 (Burkhart 2012 total IP3R ~4850, not used here)
gamma_s = 0.135e-12  # (A/V) вЂ” 0.135 pS; recalibrated 2026-06-16 for V_IM=0 (see header)


# в”Ђв”Ђ SERCA cycle (Purvis 2008 Table 1, Dode 2002 isoform 3b) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# 6-state E1/E2 cycle. Primary-source values restored from Purvis 2008
# (earlier calibration had reduced k_bind_f ~470Г— to compensate for
# IP3R Po and flux bugs; with the corrected PoвЃґ + Nernst flux the
# Purvis Vmax balances the IP3R leak at rest).
#
# вљ  CALIBRATION-COUPLED with `[ip3r.channel]` Оі above вЂ” any change to
# these rate constants requires re-deriving Оі_IP3R from the new SERCA
# cycle flux at the Dolan resting state. See
# calibration-coupling-2026-05-25.qmd chain 1.
#
# вљ  OPEN BIOLOGY QUESTION: these constants imply ~4.7 cycles/s per pump
# at cyt = 100 nM, which is ~2вЂ“5Г— higher than the SERCA3b Vmax/Km
# literature (Inesi 1985; Dode 2002 itself: Vmax 30-50 cycles/s
# saturating, Km 0.7-1.1 ВµM в†’ v/Vmax at 100 nM в‰€ 2%). The Purvis 2008
# rate constants appear to over-estimate the platelet SERCA pump rate
# at resting CaВІвЃє. v0.3+ should re-derive from primary sources. See
# dissertation-notes В§3.2.
#
# Note: an earlier draft of this comment also cited "Nishi 1992" as a
# third SERCA-literature data point. The primary Nishi 1992 paper
# could not be located in the 2026-05-26 reference audit (no clear
# PubMed match found by user or by web search); the figures it would
# have contributed come transitively via the Purvis 2008 SERCA
# bibliography. Citation removed pending source identification.
[serca.cycle]
k_shuttle_f =  600.0    # E2 в†’ E1                          (sвЃ»В№)
k_shuttle_r =  600.0    # E1 в†’ E2                          (sвЃ»В№)
k_bind_f    =  210.0    # E1 + 2 CaВІвЃє_cyt в†’ E1В·CaВІвЃє        (ВµMвЃ»ВІВ·sвЃ»В№)
k_bind_r    =   10.0    # reverse                          (sвЃ»В№)
k_phos_f    =  700.0    # E1В·Ca в†’ E1PВ·Ca                   (sвЃ»В№)
k_phos_r    =    5.0    # reverse                          (sвЃ»В№)
k_conf_f    =  600.0    # E1PВ·Ca в‡Њ E2PВ·Ca                  (sвЃ»В№)
k_conf_r    =   50.0    # reverse                          (sвЃ»В№)
k_release_f = 1000.0    # E2PВ·Ca в†’ E2P + 2 CaВІвЃє_dts        (sвЃ»В№)
k_release_r =    4.0e-3 # reverse                          (ВµMвЃ»ВІВ·sвЃ»В№; 4e9 MвЃ»ВІsвЃ»В№)
k_dephos_f  =  500.0    # E2P в†’ E2                         (sвЃ»В№)
k_dephos_r  =    1.0    # reverse                          (sвЃ»В№)


# в”Ђв”Ђ Agonist forcing curves вЂ” physiological stimulation inputs в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Each receptor sees a plateau-decay timecourse: REST в†’ ramp to PEAK at
# T_PEAK with rise П„ TAU_RISE в†’ exponential decay П„ TAU_DECAY. The peak
# is read live by the forcing functions in calcium_signalling.py, so a
# dose-sweep runscript can override at runtime (cs_mod.X_PEAK_* = ...).
#
# Attribution:
# - PEAK concentrations are sourced from the platelet-experimental
#   literature (Dolan 2014 standard activation = 1 nM thrombin /
#   10 ВµM ADP; ATP_ex peak 10 ВµM from dense granule release rates).
# - The plateau-decay SHAPE (`tau_rise_s`, `t_peak_s`, `tau_decay_s`)
#   is a *model choice* вЂ” there is no direct experimental measurement
#   of the platelet-microenvironment agonist timecourse seen by a
#   single platelet during clot formation. Values were chosen to
#   produce a plausible Dolan-2014-shape activation curve and to
#   give physiologically reasonable receptor-occupancy dynamics.
#   Different choices would shift the absolute timing of the CaВІвЃє
#   transient peak by В±5вЂ“10 s but not its shape or magnitude.

[agonists.thrombin]
# PAR1/4 agonist. Clotting cascade gives a fast rise, sustained plateau,
# slow decay. Standard stimulation = 1 nM peak (Dolan 2014).
rest_nM     = 0.0
peak_nM     = 1.0
tau_rise_s  = 0.5
t_peak_s    = 5.0
tau_decay_s = 120.0

[agonists.adp]
# P2Y1 agonist. Released from dense granules during activation, cleared
# by ectoNTPDases. Standard stimulation = 10 ВµM peak.
rest_uM     = 0.0
peak_uM     = 10.0
tau_rise_s  = 1.0
t_peak_s    = 5.0
tau_decay_s = 30.0

[agonists.atp_ex]
# P2X1 agonist. Released from dense granules during activation, cleared
# by CD39 over tens of seconds. CD39 keeps resting ATP_ex near zero вЂ”
# any small baseline leaks P2X1 over hundreds of seconds and overfills
# the DTS. Note: Python module names lack the `_S` suffix on the time
# constants (`ATP_EX_TAU_RISE`, not `ATP_EX_TAU_RISE_S`); kept as-is
# rather than renamed in this slice.
rest_uM     = 0.0
peak_uM     = 10.0
tau_rise_s  = 0.5
t_peak_s    = 1.0
tau_decay_s = 30.0


# в”Ђв”Ђ PMCA4b basal path (Caride 2007 Table 3 steps 4вЂ“5) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Basal turnover; the CaM-activated path (steps 8вЂ“11) is `[pmca.cam_activated]`
# and remains inline in calcium_signalling.py until a future slice.
[pmca.basal]
k_on  = 10.0    # PMCA + CaВІвЃє в‡Њ PMCAВ·Ca         (ВµMвЃ»В№В·sвЃ»В№)  step 4 fwd
k_off = 50.0    # reverse                       (sвЃ»В№)        step 4 rev
k_cat =  5.5    # PMCAВ·Ca в†’ PMCA + CaВІвЃє_ex      (sвЃ»В№)        step 5 (basal)


# в”Ђв”Ђ Calmodulin CaВІвЃє binding (Caride 2007 Table 3 steps 6вЂ“7) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Two-lobe cooperative scheme: slow N-lobe (step 6) then fast C-lobe
# (step 7). CaВІвЃє concentrations in ВµM; rates in ВµMвЃ»ВІВ·sвЃ»В№ (forward) or
# sвЃ»В№ (reverse).
[cam.binding]
k6  =   2.669   # CaM + 2 CaВІвЃє в†’ Caв‚‚В·CaM        (ВµMвЃ»ВІВ·sвЃ»В№)  step 6 fwd
k6r =   2.682   # reverse                        (sвЃ»В№)        step 6 rev
k7  = 170.4     # Caв‚‚В·CaM + 2 CaВІвЃє в†’ Caв‚„В·CaM    (ВµMвЃ»ВІВ·sвЃ»В№)  step 7 fwd
k7r =   1.551   # reverse                        (sвЃ»В№)        step 7 rev


# в”Ђв”Ђ P2X1 ATP-gated cation channel (Phase 2.5, 2026-05-11) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Trimeric ATP-gated cation channel in the plasma membrane. Three-state
# scheme: Closed --(k_act Г— [ATP_ex])--> Open --(k_des)--> Desensitised.
# CaВІвЃє flux through Open is Nernst-driven, gated on CA_EX_UM > 0.
#
# Attribution: Mahaut-Smith et al. 2000 / 2004 (platelet P2X1
# electrophysiology вЂ” provides the time constants П„_des and П„_rec);
# Vial & Evans 2002 (P2X1 in platelets); Hechler et al. 2003 (P2X1 in
# thrombosis); Burnstock 2007 (P2X family review).
#
# The 3-state kinetic scheme below is a coarse fit to those time
# constants вЂ” `k_des = 10 sвЃ»В№` в†’ П„_des в‰€ 100 ms (Mahaut-Smith) and
# `k_rec = 0.03 sвЃ»В№` в†’ П„_rec в‰€ 30 s (Mahaut-Smith). `k_act` and
# `k_close` are model-choice rates paired to give a steep activation
# curve at ATP_PEAK в‰€ 10 ВµM consistent with the EC50 reported in
# Mahaut-Smith 2000.
[p2x1.kinetics]
k_act   = 30.0   # closed + ATP в†’ open         (ВµMвЃ»В№В·sвЃ»В№) вЂ” fast ATP binding
k_close =  5.0   # open в†’ closed               (sвЃ»В№)       вЂ” ATP unbinds
k_des   = 10.0   # open в†’ desensitised         (sвЃ»В№)       вЂ” П„_des в‰€ 100 ms (Mahaut-Smith)
k_rec   =  0.03  # desensitised в†’ closed       (sвЃ»В№)       вЂ” П„_rec в‰€ 30 s (Mahaut-Smith)

[p2x1.channel]
# Total functional P2X1 trimers per platelet вЂ” Mahaut-Smith 2000 quotes
# a 600вЂ“3 000 channel range from voltage-clamp recordings; we use 1 000
# as a mid-range estimate.
n_total = 1000     # (count of trimers; ~3 Г— 45 kDa per trimer)
# Single-channel current ~0.5вЂ“1 pA at -60 mV (Mahaut-Smith 2000),
# CaВІвЃє fraction ~5вЂ“10 % of total current в†’ effective CaВІвЃє-specific
# Оі в‰€ 10вЂ“50 fS per channel. The value below is the calibration anchor
# for the Phase 3 SOCE-differential target (Dolan ~100 nM); not an
# independently measured single-channel Оі. See lab book.
gamma_s = 1.3e-15  # (A/V) вЂ” 1.3 fS CaВІвЃє-specific conductance; calibrated


# в”Ђв”Ђ SOCE: STIM1 dimerisation cycle (mass-action) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# STIM1 cycle keeps the dimer pool size as a state variable. STIM1_dim
# is counted in DIMER PARTICLES (matches Dolan Table S1 "STIM1в‚‚ (11)") вЂ”
# 1 dimerisation event consumes 2 free monomers and creates 1 dimer
# particle. Rate constants chosen so the Dolan 2014 Table S1 resting IC
# (st_Ca=3805, st_free=438, st_dim=11) is at detailed balance:
#   k_release_r = k_release_f Г— st_Ca / (st_free Г— ca_dts)
#               = 0.1 Г— 3805 / (438 Г— 250) = 3.475e-3 ВµMвЃ»В№В·sвЃ»В№
#   k_dim_f     = k_dim_r Г— st_dim / st_freeВІ
#               = 1.0 Г— 11 / 438ВІ в‰€ 5.73e-5  countвЃ»В№В·sвЃ»В№
[soce.stim]
k_release_f = 0.1       # STIM1В·Ca в†’ STIM1_free + Ca_dts          (sвЃ»В№)
k_release_r = 3.475e-3  # reverse                                  (ВµMвЃ»В№В·sвЃ»В№)
k_dim_f     = 5.73e-5   # 2 STIM1_free в†’ STIM1_dim                (countвЃ»В№В·sвЃ»В№)
k_dim_r     = 1.0       # reverse                                  (sвЃ»В№)


# в”Ђв”Ђ SOCE: Hoover & Lewis 2011 MWC allosteric (Dolan eq. 3) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Open-probability model for the Orai channel as a function of bound
# STIM2 dimers. Parameters from Hoover & Lewis 2011 Fig. 4 best-fit
# (verified PDF). Ka is rescaled from Hoover's HEK arbitrary units to
# platelet dimer counts: Ka_platelet Г— Sf_saturating (~170 dimers) в‰€
# Hoover's Ka Г— Stotal (~320) в†’ Ka_platelet в‰€ 1.9, rounded to 2 (the
# MWC shape is insensitive to ~2Г— perturbations at saturation). f, a, L
# are dimensionless and transfer directly from Hoover.
[soce.mwc]
L  = 1.0e-4    # (dimensionless) вЂ” opening equilibrium without STIM
Ka = 2.0       # (1/count of dimers) вЂ” STIM2 association constant (rescaled from Hoover a.u.)
f  = 14.2      # (dimensionless) вЂ” opening cooperativity per bound STIM2
a  = 0.5       # (dimensionless) вЂ” binding cooperativity (negative)


# в”Ђв”Ђ SOCE: Dolan 2014 puncta entry (eq. 2) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# qp = О± В· [CaВІвЃє]_cyt^n / (KM^n + [CaВІвЃє]_cyt^n) + baseline
# qp gives the fraction of STIM2 dimers translocated into puncta where
# they can engage Orai. О± = 0.2 is the Dolan 2014 default. KM and n are
# the two free parameters Dolan scans within homeostatic constraints
# (Fig. 3); the mid-range values are used here.
[soce.puncta]
alpha    = 0.2    # (dimensionless) вЂ” max puncta fraction at saturating [CaВІвЃє]_cyt; Dolan default
KM_uM    = 0.5    # (ВµM) вЂ” half-activation [CaВІвЃє]_cyt; Dolan-scanned mid-range
n        = 4.0    # (dimensionless) вЂ” Hill coefficient; Dolan-scanned mid-range
baseline = 0.01   # (dimensionless) вЂ” constitutive puncta fraction at zero [CaВІвЃє]_cyt


# в”Ђв”Ђ NCX (NaвЃє/CaВІвЃє exchanger) вЂ” secondary CaВІвЃє extrusion в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Forward-mode 3:1 (3 NaвЃє in : 1 CaВІвЃє out), NaвЃє-gradient driven (no ATP).
# Provides a second extrusion pathway alongside PMCA, dominating at high
# cyt CaВІвЃє where PMCA saturates. Forward mode only; reverse mode
# requires cyt NaвЃє state + V_PM, out of scope for v0.3.
#
# Attribution:
# - Platelet NCX presence: NCX1 (SLC8A1) and NCX3 (SLC8A3) detected
#   in the Burkhart 2012 proteome. Roberts et al. 2012 (Br J
#   Pharmacol) confirmed NCX/NCKX expression at the protein level
#   and showed functional contribution during platelet activation.
# - Functional contribution contested: Sage & Rink 1985 reported
#   limited activity; later work argues NCX makes a meaningful
#   contribution to peak-CaВІвЃє extrusion (specific fractional figure
#   not directly measured in platelets вЂ” order-of-magnitude estimate
#   only). See `dissertation-notes.md В§7.3` for the uncertainty
#   disclosure.
# - Kinetic form: substrate Hill term Г— allosteric CaВІвЃє-activation
#   gate. Standard NCX biophysics (Blaustein & Lederer 1999 review;
#   DiPolo & BeaugГ© 2006). The allosteric gate captures the
#   regulatory CaВІвЃє-binding site of real NCX, keeping it silent at
#   resting cyt = 100 nM regardless of substrate kinetics.
# - Values: V_max is a *calibration anchor* (not a measured platelet
#   value вЂ” no platelet-specific Vmax exists in the literature). K_m
#   and K_a sit within the experimental ranges quoted in those
#   reviews (cardiac NCX K_m,Ca в‰€ 1вЂ“10 ВµM; K_a в‰€ 0.1вЂ“0.6 ВµM). h = 4
#   is the upper end of reported allosteric cooperativity.
[ncx.kinetics]
V_max = 5000.0   # (ions/s) вЂ” total per platelet; calibration anchor (not measured)
K_m   = 5.0      # (ВµM) вЂ” substrate Hill half-saturation; within Blaustein & Lederer 1999 range
K_a   = 0.2      # (ВµM) вЂ” allosteric activation half-point; within review range
h     = 4        # (dimensionless int) вЂ” allosteric Hill cooperativity (switch-like)


# в”Ђв”Ђ GPCR cascade вЂ” P2Y1 + PAR1/4 в†’ GО±q в†’ PLCОІ (issue #9) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Explicit receptor в†’ G-protein cascade. Three Gq-coupled receptors in
# scope (P2Y1, PAR1, PAR4). Total GО±q pool from Mazet et al. 2020.
# Out of scope: GPVI (collagen, PLCОі2 path), P2Y12 (Gi-coupled, issue
# #10), receptor desensitisation kinetics (lumped into first-order
# decay). `k_basal` is calibrated to give resting Gq_active в‰€ 100 в†’
# gq_uM в‰€ 0.1 ВµM, which holds basal IP3 at the Purvis ~50 nM baseline:
#   steady-state = k_basal / (k_basal + k_rgs); target 100/5000 = 0.02
#   with k_rgs = 0.033  в†’  k_basal = 0.033 Г— 0.02/0.98 в‰€ 6.7e-4 sвЃ»В№.

[gpcr.p2y1]
# P2Y1 ADP receptor вЂ” reversible binding, no proteolytic cleavage.
# Copy number ~150 per platelet (Burkhart 2012 platelet proteome,
# Supp Table 3 P2RY1 entry; exact Supp Table value not directly
# cross-checked, but the ~150 figure is the widely-cited field
# consensus for P2Y1 binding sites per platelet). Earlier lab-book
# attribution to "Coller 1995" was incorrect вЂ” Coller, Anderson &
# Weisman's 1995 Thrombosis and Haemostasis review covers only
# GPIIb/IIIa / adhesion receptors, not ADP receptors (verified
# against the local EPUB 2026-05-26).
# k_on and k_off here
# are *model-choice* rates: there is no platelet-specific kon/koff
# measurement for P2Y1. Chosen so that activation reaches ~67 %
# at saturating ADP (= k_onВ·[ADP] / (k_onВ·[ADP] + k_off) for [ADP] = 1 ВµM),
# matching the Mazet 2020 framework's P2Y1 activation profile.
k_on  = 1.0   # (ВµMвЃ»В№В·sвЃ»В№) вЂ” model choice
k_off = 0.5   # (sвЃ»В№) вЂ” model choice

[gpcr.par1]
# PAR1 thrombin receptor вЂ” high-affinity, irreversible proteolytic
# cleavage. ~2500 copies per platelet (Brass 1992 / Burkhart 2012
# proteomics; validated in lab-book-2026-05-15-mike-papers-pip2-fix.md
# calibration table). Balabin et al. 2024 uses an equivalent ~2200
# molecules in their Table 1 model (consistent within Burkhart's В±15%
# inter-subject CV).
# k_cleave 2 nMвЃ»В№В·sвЃ»В№: order-of-magnitude consistent with the
# thrombin-PAR1 cleavage rates inferred from Vu et al. 1991 / Hung
# et al. 1992 (the first PAR1 cloning and characterisation papers).
# k_internalize: П„ ~50 s as a lumped first-order proxy for the
# receptor desensitisation + internalisation observed in Hammes &
# Coughlin 1999. No direct platelet PAR1 internalisation rate
# measurement exists; this is a Mazet 2020-framework model choice.
k_cleave      = 2.0    # (nMвЃ»В№В·sвЃ»В№) вЂ” fast cleavage; order-of-magnitude Vu 1991 / Hung 1992
k_internalize = 0.02   # (sвЃ»В№) вЂ” П„ ~50 s lumped (Hammes & Coughlin 1999 timescale)

[gpcr.par4]
# PAR4 thrombin receptor вЂ” low-affinity, slow cleavage. ~500 copies
# per platelet (Burkhart 2012 platelet proteome). PAR4 contributes
# the sustained / late phase of thrombin signalling; PAR1 dominates
# the initial fast phase.
# k_cleave 0.2 nMвЃ»В№В·sвЃ»В№: ~10Г— slower than PAR1, consistent with
# Kahn 1998 / Covic 2000 PAR4 thrombin-cleavage measurements.
# k_internalize 0.005 sвЃ»В№ (П„ ~200 s): chosen to give a slower decay
# than PAR1, matching the sustained-response biology (model choice).
k_cleave      = 0.2    # (nMвЃ»В№В·sвЃ»В№) вЂ” Kahn 1998 / Covic 2000 (slower than PAR1)
k_internalize = 0.005  # (sвЃ»В№) вЂ” П„ ~200 s (sustained response; model choice)

[gpcr.tp]
# Thromboxane TP receptor (TBXA2R), Gq-coupled (v0.61 Slice B). ~1000
# copies per platelet (low-abundance GPCR; Burkhart 2012 order). Secreted /
# synthesised TXA2 reversibly activates TP, which then contributes to the
# shared total_active_R driving GО±q вЂ” the autocrine TXA2 в†’ TP в†’ Gq amplifier.
# k_on / k_off are *model-choice* (mirroring [gpcr.p2y1]): at TXA2 в‰€ 1 ВµM the
# half-max k_off/k_on = 0.5 ВµM gives ~67% TP occupancy, a moderate amplifier
# self-limited by TXA2 decay + the v0.6 PKC brakes. TP binding does not
# deplete TXA2 (catalytic, like P2Y1/ADP); TXA2 is cleared only by decay.
k_on  = 1.0   # (ВµMвЃ»В№В·sвЃ»В№) вЂ” model choice
k_off = 0.5   # (sвЃ»В№) вЂ” model choice

[gpcr.gq]
# GО±q exchange + RGS-accelerated GTPase cycle. k_act_per_R is the
# per-receptor catalytic rate of Gq nucleotide exchange (Mazet 2020
# framework, order-of-magnitude). k_rgs ~ 1/30 sвЃ»В№ is the standard
# RGS-accelerated GО±q GTPase decay timescale in G-protein signalling
# models (the bare GО± GTP-hydrolysis rate ~ 1/100 sвЃ»В№ accelerates
# ~10-100Г— when RGS proteins are bound). k_basal
# is *calibrated* (not measured) to give resting Gq_active в‰€ 100 в†’
# gq_uM в‰€ 0.1 ВµM, which holds basal IP3 at the Purvis ~50 nM
# baseline: steady-state = k_basal / (k_basal + k_rgs); target
# 100/5000 = 0.02 with k_rgs = 0.033 в†’ k_basal в‰€ 6.7e-4 sвЃ»В№.
k_act_per_R = 0.001    # (sвЃ»В№В·countвЃ»В№) вЂ” per-receptor Gq exchange catalytic rate (Mazet 2020 order)
k_rgs       = 0.033    # (sвЃ»В№) вЂ” RGS-accelerated GTPase, П„ ~30 s; standard G-protein-signalling-model value
k_basal     = 6.7e-4   # (sвЃ»В№) вЂ” tonic Gq exchange; calibrated to hold IP3 baseline

[gpcr.gq_pool]
# Total GО±q pool вЂ” Mazet, Tindall, Gibbins & Fry 2020 (~5 000
# molecules per platelet from quantitative proteomics). Inactive GО±q
# is implicit (total minus active). Separated from rate constants so
# the Python module-level name N_GQ_TOTAL maps to a single scalar.
n_total = 5000   # (count of GО±q molecules per platelet; Mazet 2020)


[gpcr.p2y12]
# P2Y12 ADP receptor вЂ” Gi-coupled, *inhibitory* arm of ADP signalling
# (issue #10, v0.7 inhibitory-axis Slice 2). The second ADP receptor:
# ADP binds both P2Y1 (Gq, activating вЂ” above) and P2Y12 (Gi), which
# lowers cAMP and so dis-inhibits the cascade. *The* antiplatelet drug
# target (clopidogrel, ticagrelor, cangrelor).
# Copy number 425 В± 51 sites/platelet by [3H]PSB-0413 radioligand
# binding, Kd 3.3 nM (Gachet 2012 review, reporting Ohlmann et al. 2011;
# cross-references the Burkhart 2012 proteome).
# k_on/k_off are *model-choice* (mirroring P2Y1 вЂ” same ADP ligand, no
# platelet-specific P2Y12 kon/koff): Kd 0.5 ВµM, ~67 % active at 1 ВµM ADP.
n_total = 425   # (P2Y12 binding sites per platelet; radioligand binding)
k_on    = 1.0   # P2Y12_i + ADP в†’ P2Y12_a   (ВµMвЃ»В№В·sвЃ»В№) вЂ” model choice
k_off   = 0.5   # P2Y12_a в†’ P2Y12_i + ADP    (sвЃ»В№) вЂ” model choice


# в”Ђв”Ђ Inhibitory axis: cAMP / PKA brake (issue #10, v0.7 Slice 2) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# The lean cAMP/PKA "off" module that P2Y12 acts on. Resting platelets
# sit at an elevated cAMP / active-PKA tone (PGI2/NO in vivo вЂ” not yet
# modelled; folded into the basal AC rate here). ADP в†’ P2Y12 в†’ Gi lowers
# cAMP в†’ lowers PKA в†’ dis-inhibits IP3R (the brake is RELEASED). The PKA
# brake on the IP3R open probability is normalised to 1.0 at resting cAMP,
# so the resting fixed point and the Dolan 5/5 goldens are preserved by
# construction (resting ADP = 0 в†’ no P2Y12 occupancy в†’ cAMP at basal).
# The NO/cGMP/PKG arm is deferred (later slice вЂ” see
# reports/design/inhibitory-axis-design-2026-06-15.qmd). The cAMP-raising Gs
# arm (PGI2/Gs/AC + explicit PDE3A) is the v0.7 Slice 1 below.

[inhibitory.camp]
# cAMP node (issue #10 Gi arm + v0.7 Slice 1 Gs arm):
#   d[cAMP]/dt = V_ACВ·(1 + ac_gs_maxВ·gs(PGI2) + forskolin)В·(1 в€’ i_gi_maxВ·p2y12_frac)
#                в€’ k_pdeВ·(1 в€’ pde3_block)В·cAMP
# Gs arm RAISES cAMP вЂ” PGI2/iloprost (в†’PTGIRв†’Gsв†’AC, saturating in pgi2_nM) and
# forskolin (direct AC activator, a fold term); the Gi arm (ADPв†’P2Y12) LOWERS
# it; PDE3A degrades it, with cilostazol/dipyridamole as pde3_block в€€ [0,1].
# V_AC_BASAL is derived in code from camp_rest_uM Г— k_pde, so at rest (no
# agonist, no drug) cAMP sits at camp_rest. Resting basal ~1 ВµM (platelets
# default to elevated cAMP/active PKA вЂ” Blood 2014). k_pde, i_gi_max, ac_gs_max,
# K_pgi2_nM are model-choice, calibrated so 10 ВµM ADP lowers cAMP to ~25вЂ“30 % of
# basal and a saturating PGI2 raises it several-fold.
camp_rest_uM = 1.0    # resting basal cytosolic cAMP (ВµM)
k_pde        = 0.1    # PDE3A turnover (sвЃ»В№) вЂ” П„ ~ 10 s, model choice
i_gi_max     = 0.8    # max fractional AC inhibition at full P2Y12 occupancy
ac_gs_max    = 6.0    # max fold-increase in AC production at saturating PGI2/Gs
K_pgi2_nM    = 5.0    # PGI2/iloprost EC50 for Gs/AC stimulation (nM) вЂ” model choice

[inhibitory.pka]
# PKA activity = Hill(cAMP). k_pka_uM is set в‰€ resting cAMP so resting PKA is
# ~50 % вЂ” leaving HEADROOM for both cAMP-lowering (P2Y12) and cAMP-raising
# (PGI2/forskolin/PDE3-block) drugs to move it (a near-saturated resting PKA,
# the earlier 0.3 ВµM, could only fall). Brake b = 1 + gainВ·(PKA_rest в€’ PKA),
# clamped to [b_min, b_max]: b = 1 at resting PKA (so the resting fixed point
# and Dolan 5/5 are preserved by construction regardless of k_pka_uM), b > 1 as
# cAMP/PKA falls (dis-inhibition), b < 1 as cAMP/PKA rises (the PGI2 brake).
k_pka_uM   = 1.0    # cAMP for half-maximal PKA activation (ВµM) вЂ” в‰€ resting cAMP
n_pka      = 2      # Hill coefficient (int)
brake_gain = 1.0    # IP3R dis-inhibition per unit PKA-fraction drop вЂ” model choice
b_min      = 0.2    # clamp: max PKA braking (the cAMP-raising / PGI2 direction)
b_max      = 2.0    # clamp: max IP3R dis-inhibition
# Integrin (О±IIbОІ3 inside-out) PKA brake вЂ” the biologically dominant P2Y12
# effect (the clopidogrel mechanism). PKA brakes Rap1в†’integrin; ADPв†’P2Y12
# lowers PKA в†’ dis-inhibits the inside-out rate (visible PAC-1 rise), and
# P2Y12 blockade keeps PKA high в†’ integrin suppressed. Stronger gain than
# IP3R since the О±IIbОІ3 output is not CaВІвЃє-clamped. Normalised to 1 at rest.
integrin_brake_gain = 2.0   # integrin dis-inhibition per PKA-fraction drop
integrin_b_max      = 3.0   # clamp: max integrin dis-inhibition
# Granule-secretion PKA brake (v0.7 Slice 4). PKA brakes SNARE-mediated
# release; like integrin it is a functional output (not CaВІвЃє-clamped), so
# clopidogrelв†‘/PGI2в†“ are visible on cargo release. Normalised to 1 at rest.
secretion_brake_gain = 2.0  # secretion dis-inhibition per PKA-fraction drop
secretion_b_max      = 3.0  # clamp: max secretion dis-inhibition

[inhibitory.vasp]
# VASP phosphorylation вЂ” the clinical P2Y12 readout (VASP/PRI assay).
# VASP-P fraction tracks PKA: d[VASP-P]/dt = k_phosВ·PKAВ·VASP_free в€’
# k_dephosВ·VASP-P. Copy number ~45 000вЂ“79 000/platelet (Burkhart 2012
# Table 1); k_phos/k_dephos model-choice в†’ resting VASP-P в‰€ 0.6, falling
# under ADP (P2Y12 lowers cAMP) and restored under P2Y12 blockade.
n_total  = 50000   # VASP molecules per platelet (Burkhart 2012)
k_phos   = 0.1     # PKA-driven VASP phosphorylation (sвЃ»В№) вЂ” model choice
k_dephos = 0.06    # phosphatase dephosphorylation (sвЃ»В№) вЂ” model choice


# в”Ђв”Ђ PI cycle / PLCОІ вЂ” Phase 4 / issue #31 в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Coarse-grained PI cycle (v0.3 scope; full PI/PI4P/PI45P2 chain in
# v0.4). Mazet et al. 2020 framework has 35 rate constants in the full
# cycle; here we use a 5-constant reduction calibrated to reproduce the
# Dolan Fig. S2 IP3 timecourse under standard Gq forcing. Direct
# transfer of Mazet's constants would require their full chain, out of
# scope for v0.3.

[pi_cycle.plcb]
# PLCОІ activation + PIP2 hydrolysis. k_cat Г— PIP2 product was preserved
# when the PIP2 count was rescaled 1.12e5 в†’ 1.12e6 (lab-book 2026-05-15):
# k_cat 2.26e-7 в†’ 2.26e-8.
k_act   = 0.5      # PLCb_i + Gq в†’ PLCb_a              (ВµMвЃ»В№В·sвЃ»В№) вЂ” calibrated
k_inact = 0.3      # PLCb_a    в†’ PLCb_i                 (sвЃ»В№) вЂ” П„ ~ 3 s
k_cat   = 2.26e-8  # PLCb_a + PIP2 в†’ PLCb_a + IP3 + DAG (countвЃ»В№В·sвЃ»В№)

[pi_cycle.metabolism]
# PIP2 resynthesis (lumped PI в†’ PI4P в†’ PIP2) + IP3 and DAG degradation.
# П„_IP3 в‰€ 50 s matches the Dolan Fig. S2 decay tail used as a
# calibration reference target.
k_resynth = 3.62   # PIP2 / s вЂ” basal balance with k_cat Г— PIP2
k_ip3_deg = 0.02   # IP3 в†’ IP2/IP4 (lumped 5-phosphatase + 3-kinase)  (sвЃ»В№)
k_dag_deg = 0.05   # DAG в†’ PA      (DAG kinase)                       (sвЃ»В№) вЂ” П„ ~ 20 s


# в”Ђв”Ђ Mitochondrial CaВІвЃє (MCU + NCLX) вЂ” issue #22 в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Real platelets have 2вЂ“5 mitochondria per cell. MCU (inner-membrane
# channel) and NCLX (Na/Ca exchanger) together act as a fast cyt CaВІвЃє
# buffer during transients: fast Hill-cooperative uptake, slow linear
# release. Without MCU, all SOCE-imported CaВІвЃє must exit via PMCA.
# Sources: Ghatge et al. 2026, Ajanel et al. 2025, Shehwar et al. 2025
# (all in source-info/calcium-papers/).
[mito.kinetics]
V_max_MCU = 50000.0  # ions/s вЂ” total over all mitochondria; calibrated
K_MCU     = 1.0      # Hill half-saturation (ВµM)         literature 0.5вЂ“10
n_MCU     = 4        # Hill cooperativity (int)          literature 2вЂ“4
k_NCLX    = 0.005    # NCLX linear efflux (sвЃ»В№)          П„ = 200 s
C_max     = 100000.0 # matrix CaВІвЃє capacity (ions); uptake back-pressure (#76 Part 1)


# в”Ђв”Ђ Coarse-grained cytosolic CaВІвЃє buffer (gelsolin proxy) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Single 1:1 buffer representing the cytosolic CaВІвЃє buffering capacity.
# N_GSN counts effective CaВІвЃє-binding sites, not gelsolin molecules.
# Calibrated jointly with CALR (Phase 2 / #28): the Phase 2 calibration
# intentionally over-shoots the Sage & Rink ~50:1 buffering ratio
# (current rest ~200:1) вЂ” this single tunable buffer absorbs slack
# from all other cytosolic buffers not yet broken out. v0.3+ plan is
# to split into explicit gelsolin / annexin / Ca-ATP вЂ” see
# dissertation-notes В§1.1.
#
# Attribution: k_on and k_off are *model-choice* rates set to give
# Kd = 1.0 ВµM (within the EF-hand affinity range across the gelsolin
# / parvalbumin / calbindin family). k_on = 100 ВµMвЃ»В№В·sвЃ»В№ is the
# diffusion-limited bimolecular rate typical of EF-hand binding
# (Falke 1994; Linse & ForsГ©n 1995 reviews). The N_GSN count below
# is the tunable parameter; the per-rate values are not separately
# calibrated.
[buffers.gsn]
k_on  = 100.0   # (ВµMвЃ»В№В·sвЃ»В№) вЂ” fast EF-hand binding; Kd = 1 ВµM
k_off = 100.0   # (sвЃ»В№) вЂ” reverse

[buffers.gsn_pool]
# Biological gelsolin alone is ~100 000 copies Г— ~5 sites = 500 000
# sites (Burkhart 2012, Yin & Stossel 1979). N_GSN below is calibrated
# against Phase 3 peak heights with CALR active вЂ” see lab book.
n_total = 1400000   # (effective CaВІвЃє-binding sites; calibrated against Phase 3)


# в”Ђв”Ђ DTS luminal CaВІвЃє buffers (Phase 2/3 issues #25, #28) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# вљ  CALIBRATION-COUPLED with resting DTS CaВІвЃє level (target 250 ВµM
# per Dolan 2014 Fig. 3). If any kinetics or pool count below changes,
# re-verify resting cyt = 100 nM, DTS = 250 ВµM against the Phase 3
# acceptance suite. See calibration-coupling-2026-05-25.qmd chain 4.

# Calreticulin C-domain вЂ” dominant DTS dynamic buffer.
# Domain breakdown: N (lectin) | P (1 site, Kd ~1 ВµM, slow вЂ” see
# calr_p below) | C (~25 sites, Kd ~1 mM вЂ” this block). Platelet
# copy number 20 324 (Burkhart 2012; Dolan 2014 Table S1). 25 C-domain
# sites Г— 20 324 molecules в†’ 508 100 binding sites total. With CALR
# the DTS buffering ratio rises to ~72 % at rest, giving the DTS a
# large "spring" that absorbs SERCA excess and releases during IP3R
# drainage. See dissertation-notes В§2.1.
#
# Attribution: independent 1:1 CaВІвЃє-binder coarse-graining for
# calreticulin follows the Sneyd & Dufour 2002 / Hofer 1998 ER-buffer
# framework. Kd = 1.0 mM from Baksh & Michalak 1991 (CALR C-domain
# direct binding). k_on / k_off are paired to give that Kd; the
# precise rates are not measured but are fast-equilibrium relative
# to the IP3R-driven CaВІвЃє transient timescale (~1 s), so the model
# is insensitive to the absolute rates as long as Kd is preserved.
[buffers.calr]
k_on  =    1.0     # (ВµMвЃ»В№В·sвЃ»В№) вЂ” fast equilibrium; pair gives Kd = 1.0 mM
k_off = 1000.0     # (sвЃ»В№) вЂ” reverse
[buffers.calr_pool]
n_total = 508100   # (binding sites = 20 324 CALR Г— 25 C-domain sites)

# CALR P-domain вЂ” 1 high-affinity site per molecule, slow kinetics.
# Always saturated at resting DTS [CaВІвЃє] = 250 ВµM (occupancy > 99.6%)
# so doesn't matter much at rest. During IP3R-driven DTS depletion,
# the slow k_off ~ 1 sвЃ»В№ means these ~20k CaВІвЃє take ~1 s to liberate
# after free [CaВІвЃє]_DTS drops below Kd вЂ” a small "delayed reservoir"
# that smooths DTS recovery without preventing the transient
# depletion. Source: Baksh & Michalak 1991, Vassilakos 1998.
[buffers.calr_p]
k_on  = 1.0    # (ВµMвЃ»В№В·sвЃ»В№) вЂ” Baksh & Michalak 1991; pair gives Kd = 1.0 ВµM
k_off = 1.0    # (sвЃ»В№) вЂ” slow release; Vassilakos 1998
[buffers.calr_p_pool]
n_total = 20324  # (binding sites; 1 P-domain site per CALR molecule)

# HSP90B1 / GRP94 / endoplasmin вЂ” second-most-abundant ER luminal
# CaВІвЃє-binding chaperone. Argon & Simen 1999: 15 sites per molecule,
# split into 4 medium-affinity (Kd ~ 2 ВµM) and 11 low-affinity
# (Kd ~ 600 ВµM). Modelling separately captures the depletion dynamics:
# low-affinity sites release fast (bulk of deliverable reserve);
# medium sites hold until free [CaВІвЃє]_DTS drops below ~2 ВµM and act as
# a "floor" keeping free DTS [CaВІвЃє] > 0 during peak. Platelet copy
# number ~10 000 (order-of-magnitude; v0.3 stretch estimate).
[buffers.hsp90b1_medium]
# Kd = 2 ВµM from Argon & Simen 1999. k_off ~ 1 sвЃ»В№ chosen to give
# П„_release в‰€ 1 s matching the transient timescale (so these sites
# hold their CaВІвЃє during the ~1 s cyt peak and act as a depletion
# floor); k_on paired to give the correct Kd. The rates themselves
# are not directly measured.
k_on  = 0.5    # (ВµMвЃ»В№В·sвЃ»В№) вЂ” slow EF-hand; pair gives Kd = 2 ВµM
k_off = 1.0    # (sвЃ»В№) вЂ” П„_release в‰€ 1 s
[buffers.hsp90b1_low]
# Kd = 600 ВµM (Argon & Simen 1999). Faster than the medium-affinity
# sites вЂ” releases during depletion, providing the bulk of the
# deliverable reserve.
k_on  =   1.0  # (ВµMвЃ»В№В·sвЃ»В№) вЂ” pair gives Kd = 600 ВµM
k_off = 600.0  # (sвЃ»В№) вЂ” fast release
[buffers.hsp90b1_pool]
# Total binding-site counts derived in Python: N_M = molecules Г— medium,
# N_L = molecules Г— low. Storing the decomposition lets a biologist
# tweak either the protein count or the per-molecule stoichiometry.
n_molecules   = 10000   # (count of HSP90B1 molecules) вЂ” order-of-magnitude estimate; HSP90B1 is among the top ER-associated proteins in the Burkhart 2012 proteome (precise count not extractable from supplementary). v0.3 stretch estimate.
sites_medium  = 4       # (sites per molecule) вЂ” Argon & Simen 1999
sites_low     = 11      # (sites per molecule) вЂ” Argon & Simen 1999

# BiP / HSPA5 / GRP78 вЂ” most abundant ER chaperone. LiГЁvremont 1997
# demonstrated BiP contributes ~25 % of the ER CaВІвЃє store, with
# stoichiometry of 1вЂ“2 CaВІвЃє per molecule. Modelled as a single low-
# affinity pool, conservative 1-site stoichiometry (lower count chosen
# to stay biologically conservative; bound-at-rest 16 700 в‰€ lower
# bound of LiГЁvremont's 25 % of store). v0.4 may extend to explicit
# two-site model.
[buffers.bip]
# Kd = 500 ВµM single low-affinity site (LiГЁvremont 1997 "mM-range
# free [CaВІвЃє]_ER" buffering). k_on / k_off paired to give that Kd.
k_on  =    2.0  # (ВµMвЃ»В№В·sвЃ»В№) вЂ” pair gives Kd = 500 ВµM
k_off = 1000.0  # (sвЃ»В№) вЂ” reverse
[buffers.bip_pool]
# BiP is the canonically most-abundant ER chaperone (more so than
# CALR or HSP90B1). Platelet copy number ~50 000 is an
# order-of-magnitude estimate consistent with that ranking; no
# direct platelet BiP count exists in the literature.
n_molecules = 50000  # (count of BiP molecules) вЂ” order-of-magnitude estimate
sites_per   = 1      # (sites per molecule) вЂ” conservative; LiГЁvremont range 1вЂ“2

# CREC family pool (CALU + RCN1 + RCN2 lumped) вЂ” small multi-EF-hand
# low-affinity CaВІвЃє binders, ER lumen + secretory pathway. HonorГ© &
# Vorum 2000: 6вЂ“7 EF-hands per molecule, Kd "up to mM". v0.4 may split
# into individual proteins if granule secretion work requires CALU
# specifically.
[buffers.crec]
# Kd в‰€ 1 mM follows HonorГ© & Vorum 2000's "up to mM" assessment of
# CREC family EF-hand affinities. k_on / k_off paired to give that Kd.
k_on  =   0.5  # (ВµMвЃ»В№В·sвЃ»В№) вЂ” pair gives Kd = 1 mM
k_off = 500.0  # (sвЃ»В№) вЂ” reverse
[buffers.crec_pool]
# Composite of three proteins. Per-protein platelet copy numbers are
# ~5k each (order-of-magnitude across CALU / RCN1 / RCN2 from the
# Burkhart 2012 ER-associated proteome ranking; no individual citation
# per protein). Sites per molecule = 4 (functional EF-hands of 6вЂ“7
# total; structural / non-CaВІвЃє-binding excluded).
n_molecules = 15000  # (count; CALU ~5k + RCN1 ~5k + RCN2 ~5k order-of-magnitude)
sites_per   = 4      # (functional CaВІвЃє-binding EF-hands per molecule)


# в”Ђв”Ђ PMCA4b CaM-activated path (Caride 2007 Table 3 steps 8вЂ“12) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Caв‚„В·CaM binds free PMCA (step 8), the complex binds and pumps CaВІвЃє
# with ~5Г— higher k_cat than basal (step 10 vs basal step 5). Step 11
# dissociates 4 CaВІвЃє from the active complex; step 12 is the slow CaM
# dissociation. Both 11 and 12 required for mass conservation: with 11
# active but 12 absent, PMCA accumulates dead-end in PMCAВ·CaM (the bug
# previously worked around by omitting step 11 entirely; restored
# 2026-05-07 after Phase 0 audit found Caride kв‚Ѓв‚‚ missing).
#
# k12 special note: Caride 2007 measured 0.033 sвЃ»В№ in vitro (П„ = 30 s),
# but in vivo PIP2 binding to the PMCA C-terminus competitively
# displaces CaM on a much faster timescale (Penniston & Enyedi 1998
# review). The in vitro value traps PMCA in PMCAВ·CaM
# during sustained CaВІвЃє elevation; using 1 sвЃ»В№ (in-vivo, 30Г— faster)
# restores physiological PMCA Vmax during transient recovery. v0.3.1
# fix вЂ” see lab book 2026-05-12 (DTS overshoot diagnosis).
[pmca.cam_activated]
k8   =   0.2     # PMCA + Caв‚„В·CaM в†’ Caв‚„В·CaMВ·PMCA           (ВµMвЃ»В№В·sвЃ»В№) step 8 fwd
k8r  =   8.0e-4  # reverse                                   (sвЃ»В№)       step 8 rev
k9   =  50.0     # Caв‚„В·CaMВ·PMCA + CaВІвЃє в†’ Caв‚„В·CaMВ·PMCAВ·Ca   (ВµMвЃ»В№В·sвЃ»В№) step 9
k9r  =  10.0     # reverse                                   (sвЃ»В№)
k10  =  30.0     # Caв‚„В·CaMВ·PMCAВ·Ca в†’ Caв‚„В·CaMВ·PMCA + CaВІвЃє_ex (sвЃ»В№)       step 10
k11  =  10.0     # Caв‚„В·CaMВ·PMCA в†’ PMCAВ·CaM + 4 CaВІвЃє_cyt    (sвЃ»В№)       step 11 fwd
k11r =   7.332e-4 # reverse                                  (ВµMвЃ»вЃґВ·sвЃ»В№)  step 11 rev
k12  =   1.0     # PMCAВ·CaM в†’ PMCA + CaM_free  (sвЃ»В№) вЂ” in-vivo rate (see above)


# в”Ђв”Ђ PKC negative feedback (v0.6) вЂ” DAG в†’ PKC в†’ P2Y1 desensitisation в”Ђв”Ђв”Ђ
# Closes the previously dead-end DAG branch (DAG was produced by PLCОІ and
# removed by DAG kinase, feeding nothing). Adds protein kinase C as a
# DAG + CaВІвЃє coincidence detector whose active form desensitises the
# active (ADP-bound) P2Y1 receptor вЂ” an activity-dependent brake on the
# GPCR cascade. Design: reports/design/pkc-p2y1-feedback-design-2026-06-11.qmd.
# Lumped PKC (conventional PKCО±/ОІ + novel PKCОґ); isoform split is a
# documented future refinement (the f_ca_floor term is a one-parameter
# proxy for the novel, DAG-only contribution Mundell 2006 attributes to
# PKCОґ).

[pkc.kinetics]
# PKC activation cycle (PKC_inactive в‡Њ PKC_active):
#   v_act   = k_act В· PKC_inactive В· [DAG]_ВµM В· f_Ca(Ca_cyt)
#   v_inact = k_inact В· PKC_active
#   f_Ca    = f_ca_floor + (1 в€’ f_ca_floor) В· Ca^n / (K_Ca_PKC^n + Ca^n)
# Rates are model-choice: Purvis 2008 (Fig 2G) gives the multi-step
# activation *shape* and notes the ~10вЂ“15 s DAG/CaВІвЃє accumulation that
# supplies the feedback delay, but its lumped constants don't transfer
# directly. Calibrated here so PKC sits < 1 % active at rest (DAG в‰€ 15 nM,
# CaВІвЃє в‰€ 0.1 ВµM) and engages over the first ~10вЂ“15 s of the ADP transient.
k_act      = 0.7     # ВµMвЃ»В№В·sвЃ»В№  (per inactive PKC, per ВµM DAG, per f_Ca)
k_inact    = 0.05    # sвЃ»В№       (deactivation / membrane release; П„ в‰€ 20 s)
K_Ca_PKC   = 0.7     # ВµM        (cytosolic-CaВІвЃє half-max, conventional PKC)
n_Ca_PKC   = 2       # Hill coefficient (model-choice; cooperative CaВІвЃє)
f_ca_floor = 0.0     # CaВІвЃє-independent floor (novel-isoform proxy; 0 = pure conventional)

[pkc.p2y1_desens]
# PKC-mediated desensitisation of the active (ADP-bound) P2Y1 receptor вЂ”
# the headline v0.6 feedback. Mundell et al. 2006 (Mol. Pharmacol.; PMID
# 16804093): ADP drives rapid PKC-dependent P2Y1 desensitisation in human
# platelets (PKCО± + PKCОґ, GRK-independent). Nicholas et al. 2023 (PMID
# 36958516): phospho-P2Y1 desensitisation limits platelet reactivity вЂ”
# the validation target for the knockout figure. Active PKC phosphorylates
# active P2Y1 into a signalling-incompetent state that does NOT count
# toward GО±q drive; slow dephosphorylation resensitises it to the ADP-free
# inactive pool.
#   v_des = k_des В· PKC_active В· P2Y1_active     (countВ·sвЃ»В№)
#   v_res = k_res В· P2Y1_desensitised            (countВ·sвЃ»В№)
# k_des / k_res are model-choice (no platelet kon/koff for the phospho-
# reaction): k_des anchored to Mundell's "rapid" (seconds) desensitisation,
# k_res to minutes-scale dephosphorylation recovery.
k_des = 2.0e-5   # countвЃ»В№В·sвЃ»В№  (per active PKC, per active P2Y1)
k_res = 0.01     # sвЃ»В№          (dephosphorylation / resensitisation; П„ в‰€ 100 s)

[pkc.plcb_phos]
# PKC в†’ PLCОІ phosphorylation (Slice 3; the route Purvis 2008 actually used).
# Active PKC phosphorylates the *inactive* PLCОІ pool into a state Gq cannot
# activate, removing it from the activatable pool; a phosphatase slowly
# returns it. Unlike P2Y1 desensitisation (which is ADP-arm specific), this
# brake sits on the *shared* PLCОІ node downstream of ALL receptors, so it
# damps the thrombin arm too вЂ” Purvis showed it is sufficient to return
# IP3/CaВІвЃє toward baseline (Fig 2C/5E). Calibrated GENTLY here: the brake
# engages after the early IP3R/CaВІвЃє peak (PKC needs ~10вЂ“15 s), so it shapes
# the sustained tail without cutting the peak, preserving the Dolan 5/5
# peak criteria. k_plcb_phos / k_plcb_dephos are model-choice (Purvis
# Table 1 has a known 100Г— transcription erratum вЂ” see [references.*] /
# purvis-2008-k3-transcription-error.md вЂ” so its rows are not transferred
# verbatim).
#   v_phos   = k_plcb_phos   В· PKC_active В· PLCb_inactive   (countВ·sвЃ»В№)
#   v_dephos = k_plcb_dephos В· PLCb_phosphorylated          (countВ·sвЃ»В№)
k_plcb_phos   = 3.0e-5   # countвЃ»В№В·sвЃ»В№  (per active PKC, per inactive PLCОІ)
k_plcb_dephos = 0.02     # sвЃ»В№          (PLCОІ dephosphorylation; П„ в‰€ 50 s)


