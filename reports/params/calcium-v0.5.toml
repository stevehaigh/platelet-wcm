# Platelet WCM — calcium signalling kinetics (v0.5)
#
# Source-of-truth values for the rate constants consumed by
# `reconstruction/platelet/dataclasses/process/calcium_signalling.py`.
#
# This file is the externalised form of the K_* dicts in that module
# (issue #32, Phase 2). It is read at import time by
# `_params_loader.load_calcium_kinetics()`. Editing a value here changes
# the model's behaviour at the next sim — no Python edit required.
#
# Provenance: each section carries its primary literature citation
# inline. Calibration-coupling chains ("if you change X re-derive Y")
# are documented in `reports/design/calibration-coupling-2026-05-25.qmd`.
#
# Versioning: bump the filename suffix (calcium-v0.6.toml, etc.) when
# changing the schema shape. Value-only updates can stay on the current
# file; pin the value's history in git.

# ── IP3R: deYoung-Keizer 1992 / Li-Rinzel 1994 ────────────────────────
# Li & Rinzel 1994 reduction of the deYoung-Keizer 1992 8-state IP3R
# model to one slow ODE:
#   m∞(IP3, Ca) = [IP3 / (IP3 + d₁)] × [Ca_cyt / (Ca_cyt + d₅)]
#   dh/dt       = a₂ × [d₂ − (Ca_cyt + d₂) × h]
#   Po          = m∞⁴ × h
# Parameters from deYoung & Keizer 1992 PNAS 89:9895-9899 Table 1, via
# Li & Rinzel 1994 J Theor Biol 166:461-473.
[ip3r.k_dyk]
d1 = 0.13     # IP3 activation half-saturation   (µM)        b₁/a₁ = 52/400
d2 = 1.049    # Ca²⁺ inhibition half-saturation  (µM)        b₄/a₄
d5 = 0.08234  # Ca²⁺ activation half-saturation  (µM)        b₅/a₅
a2 = 0.2      # Ca²⁺ inhibition on-rate          (µM⁻¹·s⁻¹) — sets τ_h


# ── Agonist forcing curves — physiological stimulation inputs ────────
# Each receptor sees a plateau-decay timecourse: REST → ramp to PEAK at
# T_PEAK with rise τ TAU_RISE → exponential decay τ TAU_DECAY. The peak
# is read live by the forcing functions in calcium_signalling.py, so a
# dose-sweep runscript can override at runtime (cs_mod.X_PEAK_* = ...).
# Calibration target: Dolan 2014 standard activation (1 nM thrombin /
# 10 µM ADP / 10 µM ATP_ex peaks).

[agonists.thrombin]
# PAR1/4 agonist. Clotting cascade gives a fast rise, sustained plateau,
# slow decay. Standard stimulation = 1 nM peak (Dolan 2014).
rest_nM     = 0.0
peak_nM     = 1.0
tau_rise_s  = 0.5
t_peak_s    = 5.0
tau_decay_s = 120.0

[agonists.adp]
# P2Y1 agonist. Released from dense granules during activation, cleared
# by ectoNTPDases. Standard stimulation = 10 µM peak.
rest_uM     = 0.0
peak_uM     = 10.0
tau_rise_s  = 1.0
t_peak_s    = 5.0
tau_decay_s = 30.0

[agonists.atp_ex]
# P2X1 agonist. Released from dense granules during activation, cleared
# by CD39 over tens of seconds. CD39 keeps resting ATP_ex near zero —
# any small baseline leaks P2X1 over hundreds of seconds and overfills
# the DTS. Note: Python module names lack the `_S` suffix on the time
# constants (`ATP_EX_TAU_RISE`, not `ATP_EX_TAU_RISE_S`); kept as-is
# rather than renamed in this slice.
rest_uM     = 0.0
peak_uM     = 10.0
tau_rise_s  = 0.5
t_peak_s    = 1.0
tau_decay_s = 30.0


# ── PMCA4b basal path (Caride 2007 Table 3 steps 4–5) ────────────────
# Basal turnover; the CaM-activated path (steps 8–11) is `[pmca.cam_activated]`
# and remains inline in calcium_signalling.py until a future slice.
[pmca.basal]
k_on  = 10.0    # PMCA + Ca²⁺ ⇌ PMCA·Ca         (µM⁻¹·s⁻¹)  step 4 fwd
k_off = 50.0    # reverse                       (s⁻¹)        step 4 rev
k_cat =  5.5    # PMCA·Ca → PMCA + Ca²⁺_ex      (s⁻¹)        step 5 (basal)


# ── Calmodulin Ca²⁺ binding (Caride 2007 Table 3 steps 6–7) ──────────
# Two-lobe cooperative scheme: slow N-lobe (step 6) then fast C-lobe
# (step 7). Ca²⁺ concentrations in µM; rates in µM⁻²·s⁻¹ (forward) or
# s⁻¹ (reverse).
[cam.binding]
k6  =   2.669   # CaM + 2 Ca²⁺ → Ca₂·CaM        (µM⁻²·s⁻¹)  step 6 fwd
k6r =   2.682   # reverse                        (s⁻¹)        step 6 rev
k7  = 170.4     # Ca₂·CaM + 2 Ca²⁺ → Ca₄·CaM    (µM⁻²·s⁻¹)  step 7 fwd
k7r =   1.551   # reverse                        (s⁻¹)        step 7 rev


# ── P2X1 ATP-gated cation channel (Phase 2.5, 2026-05-11) ────────────
# Trimeric ATP-gated cation channel in the plasma membrane. Three-state
# scheme: Closed --(k_act × [ATP_ex])--> Open --(k_des)--> Desensitised.
# Ca²⁺ flux through Open is Nernst-driven, gated on CA_EX_UM > 0.
[p2x1.kinetics]
k_act   = 30.0   # closed + ATP → open         (µM⁻¹·s⁻¹) — fast ATP binding
k_close =  5.0   # open → closed               (s⁻¹)       — ATP unbinds
k_des   = 10.0   # open → desensitised         (s⁻¹)       — τ_des ≈ 100 ms
k_rec   =  0.03  # desensitised → closed       (s⁻¹)       — τ_rec ≈ 30 s

[p2x1.channel]
# Total P2X1 functional channels (trimers; ~3 × 45 kDa per trimer).
n_total = 1000
# Ca²⁺-specific effective conductance. Single-channel current ~0.5–1 pA
# at -60 mV, Ca²⁺ fraction ~5–10 %, so effective γ ≈ 10–50 fS per
# channel. Calibration anchor for the Phase 3 SOCE-differential target
# (Dolan ~100 nM); see lab book.
gamma_s = 1.3e-15  # A/V — 1.3 fS Ca²⁺-specific conductance
