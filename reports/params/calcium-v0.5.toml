# Platelet WCM — calcium signalling kinetics (v0.5)
#
# Source-of-truth values for the rate constants consumed by
# `reconstruction/platelet/dataclasses/process/calcium_signalling.py`.
#
# This file is the externalised form of the K_* dicts in that module
# (issue #32, Phase 2). It is read at import time by
# `_params_loader.load_calcium_kinetics()`. Editing a value here changes
# the model's behaviour at the next sim — no Python edit required.
#
# Provenance: each section carries its primary literature citation
# inline. Calibration-coupling chains ("if you change X re-derive Y")
# are documented in `reports/design/calibration-coupling-2026-05-25.qmd`.
#
# Versioning: bump the filename suffix (calcium-v0.6.toml, etc.) when
# changing the schema shape. Value-only updates can stay on the current
# file; pin the value's history in git.

# ── IP3R: deYoung-Keizer 1992 / Li-Rinzel 1994 ────────────────────────
# Li & Rinzel 1994 reduction of the deYoung-Keizer 1992 8-state IP3R
# model to one slow ODE:
#   m∞(IP3, Ca) = [IP3 / (IP3 + d₁)] × [Ca_cyt / (Ca_cyt + d₅)]
#   dh/dt       = a₂ × [d₂ − (Ca_cyt + d₂) × h]
#   Po          = m∞⁴ × h
# Parameters from deYoung & Keizer 1992 PNAS 89:9895-9899 Table 1, via
# Li & Rinzel 1994 J Theor Biol 166:461-473.
[ip3r.k_dyk]
d1 = 0.13     # IP3 activation half-saturation   (µM)        b₁/a₁ = 52/400
d2 = 1.049    # Ca²⁺ inhibition half-saturation  (µM)        b₄/a₄
d5 = 0.08234  # Ca²⁺ activation half-saturation  (µM)        b₅/a₅
a2 = 0.2      # Ca²⁺ inhibition on-rate          (µM⁻¹·s⁻¹) — sets τ_h


# ── Agonist forcing curves — physiological stimulation inputs ────────
# Each receptor sees a plateau-decay timecourse: REST → ramp to PEAK at
# T_PEAK with rise τ TAU_RISE → exponential decay τ TAU_DECAY. The peak
# is read live by the forcing functions in calcium_signalling.py, so a
# dose-sweep runscript can override at runtime (cs_mod.X_PEAK_* = ...).
# Calibration target: Dolan 2014 standard activation (1 nM thrombin /
# 10 µM ADP / 10 µM ATP_ex peaks).

[agonists.thrombin]
# PAR1/4 agonist. Clotting cascade gives a fast rise, sustained plateau,
# slow decay. Standard stimulation = 1 nM peak (Dolan 2014).
rest_nM     = 0.0
peak_nM     = 1.0
tau_rise_s  = 0.5
t_peak_s    = 5.0
tau_decay_s = 120.0

[agonists.adp]
# P2Y1 agonist. Released from dense granules during activation, cleared
# by ectoNTPDases. Standard stimulation = 10 µM peak.
rest_uM     = 0.0
peak_uM     = 10.0
tau_rise_s  = 1.0
t_peak_s    = 5.0
tau_decay_s = 30.0

[agonists.atp_ex]
# P2X1 agonist. Released from dense granules during activation, cleared
# by CD39 over tens of seconds. CD39 keeps resting ATP_ex near zero —
# any small baseline leaks P2X1 over hundreds of seconds and overfills
# the DTS. Note: Python module names lack the `_S` suffix on the time
# constants (`ATP_EX_TAU_RISE`, not `ATP_EX_TAU_RISE_S`); kept as-is
# rather than renamed in this slice.
rest_uM     = 0.0
peak_uM     = 10.0
tau_rise_s  = 0.5
t_peak_s    = 1.0
tau_decay_s = 30.0


# ── PMCA4b basal path (Caride 2007 Table 3 steps 4–5) ────────────────
# Basal turnover; the CaM-activated path (steps 8–11) is `[pmca.cam_activated]`
# and remains inline in calcium_signalling.py until a future slice.
[pmca.basal]
k_on  = 10.0    # PMCA + Ca²⁺ ⇌ PMCA·Ca         (µM⁻¹·s⁻¹)  step 4 fwd
k_off = 50.0    # reverse                       (s⁻¹)        step 4 rev
k_cat =  5.5    # PMCA·Ca → PMCA + Ca²⁺_ex      (s⁻¹)        step 5 (basal)


# ── Calmodulin Ca²⁺ binding (Caride 2007 Table 3 steps 6–7) ──────────
# Two-lobe cooperative scheme: slow N-lobe (step 6) then fast C-lobe
# (step 7). Ca²⁺ concentrations in µM; rates in µM⁻²·s⁻¹ (forward) or
# s⁻¹ (reverse).
[cam.binding]
k6  =   2.669   # CaM + 2 Ca²⁺ → Ca₂·CaM        (µM⁻²·s⁻¹)  step 6 fwd
k6r =   2.682   # reverse                        (s⁻¹)        step 6 rev
k7  = 170.4     # Ca₂·CaM + 2 Ca²⁺ → Ca₄·CaM    (µM⁻²·s⁻¹)  step 7 fwd
k7r =   1.551   # reverse                        (s⁻¹)        step 7 rev


# ── P2X1 ATP-gated cation channel (Phase 2.5, 2026-05-11) ────────────
# Trimeric ATP-gated cation channel in the plasma membrane. Three-state
# scheme: Closed --(k_act × [ATP_ex])--> Open --(k_des)--> Desensitised.
# Ca²⁺ flux through Open is Nernst-driven, gated on CA_EX_UM > 0.
[p2x1.kinetics]
k_act   = 30.0   # closed + ATP → open         (µM⁻¹·s⁻¹) — fast ATP binding
k_close =  5.0   # open → closed               (s⁻¹)       — ATP unbinds
k_des   = 10.0   # open → desensitised         (s⁻¹)       — τ_des ≈ 100 ms
k_rec   =  0.03  # desensitised → closed       (s⁻¹)       — τ_rec ≈ 30 s

[p2x1.channel]
# Total P2X1 functional channels (trimers; ~3 × 45 kDa per trimer).
n_total = 1000
# Ca²⁺-specific effective conductance. Single-channel current ~0.5–1 pA
# at -60 mV, Ca²⁺ fraction ~5–10 %, so effective γ ≈ 10–50 fS per
# channel. Calibration anchor for the Phase 3 SOCE-differential target
# (Dolan ~100 nM); see lab book.
gamma_s = 1.3e-15  # A/V — 1.3 fS Ca²⁺-specific conductance


# ── SOCE: STIM1 dimerisation cycle (mass-action) ─────────────────────
# STIM1 cycle keeps the dimer pool size as a state variable. STIM1_dim
# is counted in DIMER PARTICLES (matches Dolan Table S1 "STIM1₂ (11)") —
# 1 dimerisation event consumes 2 free monomers and creates 1 dimer
# particle. Rate constants chosen so the Dolan 2014 Table S1 resting IC
# (st_Ca=3805, st_free=438, st_dim=11) is at detailed balance:
#   k_release_r = k_release_f × st_Ca / (st_free × ca_dts)
#               = 0.1 × 3805 / (438 × 250) = 3.475e-3 µM⁻¹·s⁻¹
#   k_dim_f     = k_dim_r × st_dim / st_free²
#               = 1.0 × 11 / 438² ≈ 5.73e-5  count⁻¹·s⁻¹
[soce.stim]
k_release_f = 0.1       # STIM1·Ca → STIM1_free + Ca_dts          (s⁻¹)
k_release_r = 3.475e-3  # reverse                                  (µM⁻¹·s⁻¹)
k_dim_f     = 5.73e-5   # 2 STIM1_free → STIM1_dim                (count⁻¹·s⁻¹)
k_dim_r     = 1.0       # reverse                                  (s⁻¹)


# ── SOCE: Hoover & Lewis 2011 MWC allosteric (Dolan eq. 3) ───────────
# Open-probability model for the Orai channel as a function of bound
# STIM2 dimers. Parameters from Hoover & Lewis 2011 Fig. 4 best-fit
# (verified PDF). Ka is rescaled from Hoover's HEK arbitrary units to
# platelet dimer counts: Ka_platelet × Sf_saturating (~170 dimers) ≈
# Hoover's Ka × Stotal (~320) → Ka_platelet ≈ 1.9, rounded to 2 (the
# MWC shape is insensitive to ~2× perturbations at saturation). f, a, L
# are dimensionless and transfer directly.
[soce.mwc]
L  = 1.0e-4    # opening equilibrium without STIM
Ka = 2.0       # STIM2 association constant (rescaled from Hoover a.u.)
f  = 14.2      # opening cooperativity per bound STIM2
a  = 0.5       # binding cooperativity (negative)


# ── SOCE: Dolan 2014 puncta entry (eq. 2) ────────────────────────────
# qp = α · [Ca²⁺]_cyt^n / (KM^n + [Ca²⁺]_cyt^n) + baseline
# qp gives the fraction of STIM2 dimers translocated into puncta where
# they can engage Orai. α = 0.2 is the Dolan default. KM and n are the
# two free parameters Dolan scans within homeostatic constraints.
[soce.puncta]
alpha    = 0.2    # max puncta fraction at saturating [Ca²⁺]_cyt
KM_uM    = 0.5    # half-activation [Ca²⁺]_cyt   (Dolan-scanned)
n        = 4.0    # Hill coefficient             (Dolan-scanned)
baseline = 0.01   # constitutive puncta fraction at zero [Ca²⁺]_cyt


# ── NCX (Na⁺/Ca²⁺ exchanger) — secondary Ca²⁺ extrusion ──────────────
# Forward-mode 3:1 (3 Na⁺ in : 1 Ca²⁺ out), Na⁺-gradient driven (no ATP).
# Provides a second extrusion pathway alongside PMCA, dominating at high
# cyt Ca²⁺ where PMCA saturates. Kinetic scheme: substrate Hill term ×
# allosteric Ca²⁺-activation gate (keeps NCX silent at rest). Forward
# mode only; reverse mode requires cyt Na⁺ state + V_PM, out of scope
# for v0.3. Functional contribution is contested in the platelet
# literature — see `dissertation-notes.md §7.3` for the uncertainty
# disclosure.
[ncx.kinetics]
V_max = 5000.0   # ions/s — total per platelet; calibration anchor
K_m   = 5.0      # substrate Hill half-saturation (µM)
K_a   = 0.2      # allosteric activation half-point (µM)
h     = 4        # allosteric Hill cooperativity (int; switch-like)


# ── GPCR cascade — P2Y1 + PAR1/4 → Gαq → PLCβ (issue #9) ─────────────
# Explicit receptor → G-protein cascade. Three Gq-coupled receptors in
# scope (P2Y1, PAR1, PAR4). Total Gαq pool from Mazet et al. 2020.
# Out of scope: GPVI (collagen, PLCγ2 path), P2Y12 (Gi-coupled, issue
# #10), receptor desensitisation kinetics (lumped into first-order
# decay). `k_basal` is calibrated to give resting Gq_active ≈ 100 →
# gq_uM ≈ 0.1 µM, which holds basal IP3 at the Purvis ~50 nM baseline:
#   steady-state = k_basal / (k_basal + k_rgs); target 100/5000 = 0.02
#   with k_rgs = 0.033  →  k_basal = 0.033 × 0.02/0.98 ≈ 6.7e-4 s⁻¹.

[gpcr.p2y1]
# ADP receptor, reversible binding. ~150 copies (Coller 1995).
k_on  = 1.0   # P2Y1_i + ADP → P2Y1_a   (µM⁻¹·s⁻¹)
k_off = 0.5   # reverse                  (s⁻¹)

[gpcr.par1]
# Thrombin receptor, high-affinity, irreversible proteolytic cleavage.
# ~2500 copies per platelet.
k_cleave      = 2.0    # PAR1_i + thrombin → PAR1_a  (nM⁻¹·s⁻¹) — fast
k_internalize = 0.02   # PAR1_a → PAR1_i             (s⁻¹) — τ ~50s (lumped)

[gpcr.par4]
# Thrombin receptor, low-affinity. ~500 copies per platelet.
k_cleave      = 0.2    # PAR4_i + thrombin → PAR4_a  (nM⁻¹·s⁻¹) — slower
k_internalize = 0.005  # PAR4_a → PAR4_i             (s⁻¹) — τ ~200s (sustained)

[gpcr.gq]
# Gαq exchange + RGS-accelerated GTPase cycle.
k_act_per_R = 0.001    # active receptor catalyses Gq exchange  (s⁻¹·count⁻¹)
k_rgs       = 0.033    # Gq_active → Gq_inactive                 (s⁻¹) — τ ~30s
k_basal     = 6.7e-4   # tonic Gq exchange at zero agonist       (s⁻¹)

[gpcr.gq_pool]
# Total Gαq pool — Mazet, Tindall, Gibbins & Fry 2020. Inactive Gαq is
# implicit (total minus active). Separated from rate constants so the
# Python module-level name N_GQ_TOTAL maps to a single scalar.
n_total = 5000


# ── PI cycle / PLCβ — Phase 4 / issue #31 ────────────────────────────
# Coarse-grained PI cycle (v0.3 scope; full PI/PI4P/PI45P2 chain in
# v0.4). Mazet et al. 2020 framework has 35 rate constants in the full
# cycle; here we use a 5-constant reduction calibrated to reproduce the
# Dolan Fig. S2 IP3 timecourse under standard Gq forcing. Direct
# transfer of Mazet's constants would require their full chain, out of
# scope for v0.3.

[pi_cycle.plcb]
# PLCβ activation + PIP2 hydrolysis. k_cat × PIP2 product was preserved
# when the PIP2 count was rescaled 1.12e5 → 1.12e6 (lab-book 2026-05-15):
# k_cat 2.26e-7 → 2.26e-8.
k_act   = 0.5      # PLCb_i + Gq → PLCb_a              (µM⁻¹·s⁻¹) — calibrated
k_inact = 0.3      # PLCb_a    → PLCb_i                 (s⁻¹) — τ ~ 3 s
k_cat   = 2.26e-8  # PLCb_a + PIP2 → PLCb_a + IP3 + DAG (count⁻¹·s⁻¹)

[pi_cycle.metabolism]
# PIP2 resynthesis (lumped PI → PI4P → PIP2) + IP3 and DAG degradation.
# τ_IP3 ≈ 50 s matches the Dolan Fig. S2 decay tail used as a
# calibration reference target.
k_resynth = 3.62   # PIP2 / s — basal balance with k_cat × PIP2
k_ip3_deg = 0.02   # IP3 → IP2/IP4 (lumped 5-phosphatase + 3-kinase)  (s⁻¹)
k_dag_deg = 0.05   # DAG → PA      (DAG kinase)                       (s⁻¹) — τ ~ 20 s


# ── Mitochondrial Ca²⁺ (MCU + NCLX) — issue #22 ──────────────────────
# Real platelets have 2–5 mitochondria per cell. MCU (inner-membrane
# channel) and NCLX (Na/Ca exchanger) together act as a fast cyt Ca²⁺
# buffer during transients: fast Hill-cooperative uptake, slow linear
# release. Without MCU, all SOCE-imported Ca²⁺ must exit via PMCA.
# Sources: Ghatge et al. 2026, Ajanel et al. 2025, Shehwar et al. 2025
# (all in source-info/calcium-papers/).
[mito.kinetics]
V_max_MCU = 50000.0  # ions/s — total over all mitochondria; calibrated
K_MCU     = 1.0      # Hill half-saturation (µM)         literature 0.5–10
n_MCU     = 4        # Hill cooperativity (int)          literature 2–4
k_NCLX    = 0.005    # NCLX linear efflux (s⁻¹)          τ = 200 s


# ── Coarse-grained cytosolic Ca²⁺ buffer (gelsolin proxy) ────────────
# Single 1:1 buffer representing the cytosolic Ca²⁺ buffering capacity.
# N_GSN counts effective Ca²⁺-binding sites, not gelsolin molecules.
# Calibrated jointly with CALR (Phase 2 / #28): the Phase 2 calibration
# intentionally over-shoots the Sage & Rink ~50:1 buffering ratio
# (current rest ~200:1) — this single tunable buffer absorbs slack
# from all other cytosolic buffers not yet broken out. v0.3+ plan is
# to split into explicit gelsolin / annexin / Ca-ATP — see
# dissertation-notes §1.1.
[buffers.gsn]
k_on  = 100.0   # GSN_site + Ca²⁺ → GSN_site·Ca  (µM⁻¹·s⁻¹) — fast EF-hand
k_off = 100.0   # reverse                         (s⁻¹)       — Kd = 1.0 µM

[buffers.gsn_pool]
# Biological gelsolin alone is ~100 000 copies × ~5 sites = 500 000
# sites (Burkhart 2012, Yin & Stossel 1979). N_GSN below is calibrated
# against Phase 3 peak heights with CALR active — see lab book.
n_total = 1400000


# ── PMCA4b CaM-activated path (Caride 2007 Table 3 steps 8–12) ───────
# Ca₄·CaM binds free PMCA (step 8), the complex binds and pumps Ca²⁺
# with ~5× higher k_cat than basal (step 10 vs basal step 5). Step 11
# dissociates 4 Ca²⁺ from the active complex; step 12 is the slow CaM
# dissociation. Both 11 and 12 required for mass conservation: with 11
# active but 12 absent, PMCA accumulates dead-end in PMCA·CaM (the bug
# previously worked around by omitting step 11 entirely; restored
# 2026-05-07 after Phase 0 audit found Caride k₁₂ missing).
#
# k12 special note: Caride 2007 measured 0.033 s⁻¹ in vitro (τ = 30 s),
# but in vivo PIP2 binding to the PMCA C-terminus competitively
# displaces CaM on a much faster timescale (Penniston & Enyedi 1998
# review; Mandal 2024). The in vitro value traps PMCA in PMCA·CaM
# during sustained Ca²⁺ elevation; using 1 s⁻¹ (in-vivo, 30× faster)
# restores physiological PMCA Vmax during transient recovery. v0.3.1
# fix — see lab book 2026-05-12 (DTS overshoot diagnosis).
[pmca.cam_activated]
k8   =   0.2     # PMCA + Ca₄·CaM → Ca₄·CaM·PMCA           (µM⁻¹·s⁻¹) step 8 fwd
k8r  =   8.0e-4  # reverse                                   (s⁻¹)       step 8 rev
k9   =  50.0     # Ca₄·CaM·PMCA + Ca²⁺ → Ca₄·CaM·PMCA·Ca   (µM⁻¹·s⁻¹) step 9
k9r  =  10.0     # reverse                                   (s⁻¹)
k10  =  30.0     # Ca₄·CaM·PMCA·Ca → Ca₄·CaM·PMCA + Ca²⁺_ex (s⁻¹)       step 10
k11  =  10.0     # Ca₄·CaM·PMCA → PMCA·CaM + 4 Ca²⁺_cyt    (s⁻¹)       step 11 fwd
k11r =   7.332e-4 # reverse                                  (µM⁻⁴·s⁻¹)  step 11 rev
k12  =   1.0     # PMCA·CaM → PMCA + CaM_free  (s⁻¹) — in-vivo rate (see above)
