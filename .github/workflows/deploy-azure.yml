name: Deploy to Azure

on:
  push:
    branches: [webapp]
  workflow_dispatch:
    inputs:
      rebuild_base:
        description: 'Force rebuild runtime + code layers (slow, ~30 min)'
        type: boolean
        default: false

env:
  ACR_REGISTRY: wcecoliacr.azurecr.io
  RESOURCE_GROUP: wcecoli-rg
  ACI_NAME: wcecoli-webapp
  ACI_DNS: wcecoli-webapp
  ACI_LOCATION: uksouth
  STORAGE_ACCOUNT: wcecolistorage
  FILE_SHARE: wcecoli-out

jobs:
  # ── Build the base images (runtime + code) ──────────────────────
  # Skipped on normal pushes unless cloud/docker/runtime/ or
  # cloud/docker/wholecell/ changed, or force-triggered.
  build-base:
    runs-on: ubuntu-latest
    outputs:
      code_tag: ${{ steps.tags.outputs.code_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if base rebuild needed
        id: check
        run: |
          if [[ "${{ github.event.inputs.rebuild_base }}" == "true" ]]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # First push to a branch has a null before SHA — rebuild to be safe
          BEFORE="${{ github.event.before }}"
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" || -z "$BEFORE" ]]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Verify BEFORE commit is available (shallow clones may lack it)
          if ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Check if base Dockerfiles, requirements, or core source changed
          git diff --name-only "$BEFORE" ${{ github.sha }} 2>/dev/null | \
            grep -qE '^(cloud/docker/(runtime|wholecell)/|requirements\.txt|setup\.py|Makefile|wholecell/(io|utils|processes|listeners|fireworks)/|models/|reconstruction/|runscripts/)' \
            && echo "needed=true" >> "$GITHUB_OUTPUT" \
            || echo "needed=false" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        if: steps.check.outputs.needed == 'true'
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build & push wcm-runtime
        if: steps.check.outputs.needed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cloud/docker/runtime/Dockerfile
          push: true
          tags: ${{ env.ACR_REGISTRY }}/wcm-runtime:latest
          cache-from: type=registry,ref=${{ env.ACR_REGISTRY }}/wcm-runtime:buildcache
          cache-to: type=registry,ref=${{ env.ACR_REGISTRY }}/wcm-runtime:buildcache,mode=max

      - name: Build & push wcm-code
        if: steps.check.outputs.needed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cloud/docker/wholecell/Dockerfile
          push: true
          tags: ${{ env.ACR_REGISTRY }}/wcm-code:latest
          build-args: |
            from=${{ env.ACR_REGISTRY }}/wcm-runtime:latest
            git_hash=${{ github.sha }}
            git_branch=${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.ACR_REGISTRY }}/wcm-code:buildcache
          cache-to: type=registry,ref=${{ env.ACR_REGISTRY }}/wcm-code:buildcache,mode=max

      - name: Set code image tag
        id: tags
        run: echo "code_tag=${{ env.ACR_REGISTRY }}/wcm-code:latest" >> "$GITHUB_OUTPUT"

  # ── Build the webapp layer (fast, always runs) ──────────────────
  build-webapp:
    runs-on: ubuntu-latest
    needs: build-base
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push wcm-webapp
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cloud/docker/webapp/Dockerfile
          push: true
          tags: ${{ env.ACR_REGISTRY }}/wcm-webapp:latest
          build-args: |
            from=${{ env.ACR_REGISTRY }}/wcm-code:latest

  # ── Deploy to Azure Container Instances ─────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-webapp
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete existing container (if any)
        continue-on-error: true
        run: |
          az container delete \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.ACI_NAME }} \
            --yes

      - name: Deploy to ACI
        run: |
          az container create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.ACI_NAME }} \
            --image ${{ env.ACR_REGISTRY }}/wcm-webapp:latest \
            --os-type Linux \
            --cpu 4 \
            --memory 8 \
            --ports 80 \
            --dns-name-label ${{ env.ACI_DNS }} \
            --registry-login-server ${{ env.ACR_REGISTRY }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --azure-file-volume-share-name ${{ env.FILE_SHARE }} \
            --azure-file-volume-account-name ${{ env.STORAGE_ACCOUNT }} \
            --azure-file-volume-account-key ${{ secrets.AZURE_STORAGE_KEY }} \
            --azure-file-volume-mount-path /wcEcoli/out \
            --environment-variables WCECOLI_WEBAPP_MODE=container WEBAPP_PORT=80

      - name: Verify deployment
        run: |
          echo "Waiting for container to start..."
          sleep 30
          FQDN="${{ env.ACI_DNS }}.${{ env.ACI_LOCATION }}.azurecontainer.io"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://${FQDN}/")
          echo "HTTP response: ${HTTP_CODE}"
          echo "🌐 Live at: http://${FQDN}/"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Webapp returned HTTP ${HTTP_CODE} — check container logs"
            az container logs --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ env.ACI_NAME }}
          fi
