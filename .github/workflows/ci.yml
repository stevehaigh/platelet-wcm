name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Platelet unit + integration + regression tests ────────────────────────
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11.5"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-platelet-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-platelet-ci.txt

      - name: Run platelet tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          OPENBLAS_NUM_THREADS: "1"
          MPLBACKEND: Agg
        run: |
          python -m pytest models/platelet/tests/ -v --tb=short

      - name: Run wholecell framework tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          OPENBLAS_NUM_THREADS: "1"
          MPLBACKEND: Agg
        run: |
          python -m pytest wholecell/tests/ -v --tb=short

  # ── Kinetics review: render reports/design/kinetics-v0.6-review.pdf ───────
  kinetics-review:
    name: kinetics-review PDF
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.5"

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        # GH_TOKEN authenticates the action's GitHub-API lookup of the latest
        # TinyTeX release; without it the unauthenticated call is intermittently
        # rate-limited (HTTP 403 "Unable to determine latest release for
        # rstudio/tinytex-releases"), failing this job spuriously.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tinytex: true

      - name: Install kinetics-review fonts (system-wide via apt)
        # Quarto's bundled TinyTeX doesn't ship tlmgr, and even if it
        # did, fontspec resolves via fontconfig (system fonts), not
        # TeX's kpathsea. Ubuntu's `fonts-texgyre` + `fonts-dejavu-core`
        # apt packages install both fonts directly under /usr/share/fonts
        # where xelatex finds them. `make kinetics-fonts` detects this
        # and skips its TeX-Live-copy path.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-texgyre fonts-dejavu-core
          fc-cache -f

      - name: Build kinetics review PDF
        # The render auto-installs the `wasy` LaTeX package via TinyTeX's
        # tlmgr; some CTAN mirrors intermittently serve an unsigned package
        # database, which aborts the signature check and fails the render
        # (a flake unrelated to repo changes). Retry once — a fresh mirror
        # draw usually succeeds — before giving up.
        run: |
          make kinetics-review || {
            echo "::warning::kinetics-review render failed (likely a transient CTAN mirror); retrying"
            make kinetics-review
          }

      - name: Upload kinetics-review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kinetics-review
          path: |
            reports/design/kinetics-v0.6-review.pdf
            reports/design/kinetics-v0.6-review.qmd
            reports/params/calcium-v0.6-references.bib

  # ── Type checking (platelet paths only) ───────────────────────────────────
  typecheck:
    name: mypy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.5"
          cache: pip
          cache-dependency-path: requirements-platelet-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-platelet-ci.txt

      - name: mypy — platelet paths
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m mypy \
            models/platelet/ \
            reconstruction/platelet/ \
            runscripts/manual/runPlateletSim.py \
            runscripts/manual/analysisPlatelet.py
